<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirección Amazon Afiliados</title>
    <style>
        /* Estilos básicos */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff7f50, #ff6347);
            color: #fff;
        }

        /* Contenedor principal */
        .container {
            background: #ffffff20;
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
        }

        input:focus {
            border-color: #ff7f50;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            background: #ff7f50;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #ff6347;
        }

        /* Pie de página */
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Redirección Amazon Afiliados</h1>
        <p>Pega un enlace de Amazon y serás redirigido con nuestro código de afiliado. ¡Gracias por apoyar!</p>
        <input id="amazonLink" type="text" placeholder="Pega tu enlace de Amazon aquí">
        <button onclick="redirectWithAffiliate()">Redirigir ahora</button>
        <div class="footer">Desarrollado con 💻 para <strong>asesoriaecomm-21</strong></div>
    </div>

    <script>
        function redirectWithAffiliate() {
            const inputField = document.getElementById('amazonLink');
            let amazonUrl = inputField.value.trim();

            if (!amazonUrl || !amazonUrl.includes('amazon')) {
                alert('Por favor, ingresa un enlace válido de Amazon.');
                return;
            }

            // Añadir el código de afiliado al enlace
            const url = new URL(amazonUrl);
            url.searchParams.set('tag', 'asesoriaecomm-21'); // Agrega el parámetro `tag`

            // Redirigir al usuario
            window.location.href = url.toString();
        }
    </script>
</body>
</html>
